<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 360" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" fill="#ffffff">
    <polygon points="30,10 200,10 170,100 0,100"/>
    <polygon points="0,120 170,120 200,210 30,210"/>
    <polygon points="30,230 200,230 170,320 0,320"/>
  </g>
</svg>
